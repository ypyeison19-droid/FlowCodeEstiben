name: Deploy – StreamFlow

on:
  push:
    branches: [main]

# Permisos necesarios para el despliegue
permissions:
  contents: read
  deployments: write # Si usas GitHub Deployments

jobs:
  test:
    name: Ejecutar Pruebas (antes de deploy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm" # Mejora importante: usa caché

      - name: Instalar dependencias
        run: npm ci # Más rápido y determinista que npm install

      - name: Ejecutar pruebas
        run: npm test

  deploy:
    name: Desplegar a Producción
    runs-on: ubuntu-latest
    needs: test # ← Muy importante: solo despliega si las pruebas pasan
    if: github.ref == 'refs/heads/main' # Seguridad extra

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Permite obtener tags y versión completa

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar pruebas (doble verificación)
        run: npm test

      - name: Construir la aplicación
        run: npm run build # ← Recomendado agregar este paso

      - name: Mostrar información de versión
        run: |
          echo "🚀 Iniciando despliegue de StreamFlow"
          echo "📦 Versión: $(node -p "require('./package.json').version")"
          echo "🌿 Rama: ${GITHUB_REF#refs/heads/}"
          echo "🔍 Commit: ${GITHUB_SHA:0:7}"

      # ==================== AQUÍ VA TU COMANDO REAL DE DESPLIEGUE ====================
      - name: Desplegar aplicación
        run: |
          echo "🔄 Iniciando despliegue real..."

          # Ejemplo: Si usas Vercel
          # npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}

          # Ejemplo: Si usas Railway
          # npx railway deploy

          # Ejemplo: Si usas Netlify
          # npx netlify deploy --prod --dir=dist

          echo "✅ Despliegue completado exitosamente"
          echo "🌐 URL de producción: https://streamflow.example.com"